---
# yaml-language-server: $schema=values.schema.json

global:
  nameOverride: cardiac-uhn

defaultPodOptions:
  automountServiceAccountToken: true
  enableServiceLinks: false
  imagePullSecrets:
    - name: github-uhn-registry

serviceAccount:
  vault-auth:
    forceRename: vault-auth

controllers:
  main:
    type: deployment
    replicas: 1
    serviceAccount:
      identifier: vault-auth
    annotations:
      reloader.stakater.com/auto: "true"
    initContainers:
      vault-agent-auth:
        image:
          repository: hashicorp/vault
          tag: 1.21.4
          pullPolicy: IfNotPresent
        args:
          - agent
          - -config=/etc/vault/vault-agent-config.hcl
          - -log-level=debug
      consul-template-copy:
        dependsOn:
          - vault-agent-auth
        image:
          repository: hashicorp/consul-template
          tag: 0.42.0
          pullPolicy: IfNotPresent
        command:
          - /bin/ash
          - -c
        args:
          - cp /bin/consul-template /vault/consul-template
    containers:
      main:
        nameOverride: cardiac-uhn
        image:
          repository: ghcr.io/uhn/cardiac-uhn
          tag: "0.1.0"
          pullPolicy: IfNotPresent
        command:
          - /vault/consul-template
        args:
          - -config
          - /etc/vault/consul-template-config.hcl
        env:
          - name: MY_POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: MY_POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: MY_POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
        ports:
          - name: http
            containerPort: 3000
            protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 100m
            memory: 512Mi

service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 3000
        targetPort: 3000

ingress: {}

configMaps:
  vault-config:
    includeChecksumInControllers:
      - main
    data:
      vault-agent-config.hcl: |-
        exit_after_auth = true
        vault {
          address = {{ .Values.vault.address | quote }}
        }
        auto_auth {
          method "kubernetes" {
            mount_path = "{{ .Values.vault.kubernetesAuthMountPath }}"
            config = {
              role = {{ default .Release.Namespace .Values.vault.role | quote }}
            }
          }
          sink "file" {
            config = {
              path = "/vault/.vault-token"
            }
          }
        }
      consul-template-config.hcl: |-
        log_level = "info"

        vault {
          address = {{ .Values.vault.address | quote }}
          renew_token = true
          vault_agent_token_file = "/vault/.vault-token"
          retry {
            enabled = true
            attempts = 50
            backoff = "1s"
            max_backoff = "1m"
          }
        }

        {{- if .Values.nats.tls.server }}
        template {
          perms = 0660
          destination = "/vault/nats_ca.pem"
          left_delimiter = "{:"
          right_delimiter = ":}"
          contents = <<EOH
        {:- $ip_sans := printf "ip_sans=127.0.0.1,%s" (env "MY_POD_IP") -:}
        {:- with secret {{ printf "%s/%s.svc.cluster.local" .Values.nats.pki.issuePath .Release.Namespace | quote }} {{ printf "common_name=%s.%s.svc.cluster.local" .Release.Name .Release.Namespace | quote }} $ip_sans "ttl={{ .Values.nats.pki.issueTtl }}" -:}
        {:- .Data.issuing_ca -:}{: end :}
        EOH
        }
        {{- end }}

        {{- if .Values.nats.tls.client }}
        template {
          perms = 0660
          destination = "/vault/nats_key.pem"
          left_delimiter = "{:"
          right_delimiter = ":}"
          contents = <<EOH
        {:- $ip_sans := printf "ip_sans=127.0.0.1,%s" (env "MY_POD_IP") -:}
        {:- with secret {{ printf "%s/%s.svc.cluster.local" .Values.nats.pki.issuePath .Release.Namespace | quote }} {{ printf "common_name=%s.%s.svc.cluster.local" .Release.Name .Release.Namespace | quote }} $ip_sans "ttl={{ .Values.nats.pki.issueTtl }}" -:}
        {:- .Data.private_key -:}{: end :}
        EOH
        }
        template {
          perms = 0660
          destination = "/vault/nats_cert.pem"
          left_delimiter = "{:"
          right_delimiter = ":}"
          contents = <<EOH
        {:- $ip_sans := printf "ip_sans=127.0.0.1,%s" (env "MY_POD_IP") -:}
        {:- with secret {{ printf "%s/%s.svc.cluster.local" .Values.nats.pki.issuePath .Release.Namespace | quote }} {{ printf "common_name=%s.%s.svc.cluster.local" .Release.Name .Release.Namespace | quote }} $ip_sans "ttl={{ .Values.nats.pki.issueTtl }}" -:}
        {:- .Data.certificate -:}{: end :}
        EOH
        }
        {{- end }}

        {{- if .Values.nats.nkeys.enable }}
        template {
          perms = 0440
          destination = "/vault/.creds.nkeys"
          left_delimiter = "{:"
          right_delimiter = ":}"
          contents = <<EOH
        {:- with secret {{ .Values.nats.nkeys.vaultSecretPath | quote }} -:}
        {:- base64Decode .Data.creds -:}
        {: end :}
        EOH
        }
        {{- end }}

        {{- range .Values.files }}
        template {
          destination = "{{ .destination }}"
          perms = {{ .perms }}
          left_delimiter = "{:"
          right_delimiter = ":}"
          contents = <<EOH
        {{ tpl .contents $ | nindent 8 }}
        EOH
        }
        {{- end }}

        template {
          destination = "/vault/run.sh"
          left_delimiter = "{:"
          right_delimiter = ":}"
          contents = <<EOH
        #!/bin/sh
        set -eu

        {{- if .Values.nats.enable }}
        export NATS_URL={{ default (printf "nats://nats.%s.svc.cluster.local:4222" .Release.Namespace) .Values.nats.uri | quote }}
        {{- if .Values.nats.tls.server }}
        export NATS_TLS_CA="/vault/nats_ca.pem"
        {{- end }}
        {{- if .Values.nats.tls.client }}
        export NATS_TLS_CERT="/vault/nats_cert.pem"
        export NATS_TLS_KEY="/vault/nats_key.pem"
        {{- end }}
        {{- if .Values.nats.nkeys.enable }}
        export NATS_CREDS="/vault/.creds.nkeys"
        {{- end }}
        {{- end }}

        {{- if .Values.mongo.enable }}
        export MONGO_URL="{{ default (printf "mongodb://{:- with secret %s -:}{: .Data.username :}:{: .Data.password :}{: end :}@{:- with secret \"secret/mongo\" -:}{: .Data.data.url :}{: end :}" (default (printf "db/mongo.%s.svc.cluster.local/static-creds/%s-%s" .Release.Namespace .Release.Namespace .Release.Name) .Values.mongo.authSecretPath | quote)) .Values.mongo.hostPort }}"
        export MONGO_DB={{ default (printf "%s-%s" .Release.Namespace .Release.Name) .Values.mongo.database | quote }}
        {{- end }}

        {{- with .Values.environment.custom }}
        # Custom configuration
        {{ . | nindent 8 }}
        {{- end }}

        {{- with .Values.initializationScript }}
        {{ tpl . $ | nindent 8 }}
        {{- end }}

        {{ .Values.application.command }}
        EOH
        }

        exec {
          command = "/bin/sh /vault/run.sh"
          kill_signal = "SIGKILL"
          reload_signal = "SIGKILL"
          kill_timeout = "2s"
        }

persistence:
  vault-shared:
    type: emptyDir
    medium: Memory
    globalMounts:
      - path: /vault
  vault-config:
    type: configMap
    identifier: vault-config
    advancedMounts:
      main:
        vault-agent-auth:
          - path: /etc/vault
            readOnly: true
        main:
          - path: /etc/vault
            readOnly: true

application:
  command: exec /app/start

environment:
  custom: ""

files: []

initializationScript: ""

vault:
  address: https://vault.uhndhp.io
  role: ""
  kubernetesAuthMountPath: auth/kubernetes

nats:
  enable: true
  tls:
    server: false
    client: false
  pki:
    issuePath: pki/cluster.local/issue
    issueTtl: 8760h
  nkeys:
    enable: false
    vaultSecretPath: ""
  uri: ""

mongo:
  enable: true
  hostPort: ""
  database: ""
  authSecretPath: ""
